name: Test EC2 Runner

on:
  workflow_dispatch:  # Manual trigger
  push:
    branches: [main]
    paths:
      - '.github/workflows/test-runner.yml'

jobs:
  test-runner:
    name: 🧪 Test Self-Hosted Runner
    runs-on: self-hosted
    
    steps:
      - name: 📥 Checkout code
        uses: actions/checkout@v4

      - name: 🖥️ Show Runner Information
        run: |
          echo "=========================================="
          echo "  ✅ EC2 RUNNER TRIGGERED SUCCESSFULLY   "
          echo "=========================================="
          echo ""
          echo "🖥️  Runner Information:"
          echo "  Hostname: $(hostname)"
          echo "  IP Address: $(hostname -i 2>/dev/null || echo 'N/A')"
          echo "  OS: $(cat /etc/os-release | grep PRETTY_NAME | cut -d'=' -f2 | tr -d '"')"
          echo "  Kernel: $(uname -r)"
          echo ""
          echo "📦 Installed Tools:"
          echo "  Node.js: $(node --version 2>&1 || echo 'NOT INSTALLED')"
          echo "  npm: $(npm --version 2>&1 || echo 'NOT INSTALLED')"
          echo "  Docker: $(docker --version 2>&1 || echo 'NOT INSTALLED')"
          echo "  Git: $(git --version 2>&1 || echo 'NOT INSTALLED')"
          echo "  Terraform: $(terraform version 2>&1 | head -1 || echo 'NOT INSTALLED')"
          echo "  kubectl: $(kubectl version --client --short 2>&1 || echo 'NOT INSTALLED')"
          echo "  AWS CLI: $(aws --version 2>&1 | head -1 || echo 'NOT INSTALLED')"
          echo ""
          echo "🏷️  Runner Labels: ${{ toJson(runner.labels) }}"
          echo "📍 Runner Name: ${{ runner.name }}"
          echo "🔧 Runner OS: ${{ runner.os }}"
          echo "🏗️  Architecture: ${{ runner.arch }}"
          echo ""
          echo "=========================================="
          echo "  🎉 RUNNER IS WORKING CORRECTLY!       "
          echo "=========================================="

      - name: 🐳 Test Docker
        run: |
          echo "Testing Docker..."
          if command -v docker &> /dev/null; then
            docker run --rm hello-world && echo "✅ Docker working!" || echo "⚠️ Docker test failed but Docker is installed"
          else
            echo "❌ Docker not installed"
            exit 1
          fi

      - name: 🟢 Test Node.js
        run: |
          echo "Testing Node.js..."
          if command -v node &> /dev/null; then
            cd apps/payment-api
            npm --version
            node --version
            echo "✅ Node.js working!"
          else
            echo "❌ Node.js not installed"
            exit 1
          fi

      - name: ☁️ Test AWS CLI
        run: |
          echo "Testing AWS CLI..."
          if command -v aws &> /dev/null; then
            aws --version
            aws sts get-caller-identity 2>&1 || echo "AWS credentials not configured (this is OK for runner test)"
            echo "✅ AWS CLI working!"
          else
            echo "❌ AWS CLI not installed"
            exit 1
          fi

      - name: 📊 Upload Test Result
        run: |
          echo "Test completed at $(date)" > test-result.txt
          echo "Runner: $(hostname)" >> test-result.txt
          
      - name: 🎊 Show Success Message
        run: |
          echo ""
          echo "=========================================="
          echo "  🎉 SUCCESS! Your EC2 runner works!    "
          echo "=========================================="
          echo ""
          echo "Next steps:"
          echo "1. Check the NebulaPay-OPS CI/CD pipeline"
          echo "2. Push code to trigger automated builds"
          echo "3. Monitor runner logs: sudo journalctl -u actions.runner.* -f"
          echo ""
