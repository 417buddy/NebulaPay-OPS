name: CI/CD Pipeline

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]
  workflow_dispatch:

env:
  AWS_REGION: us-east-1
  ECR_REGISTRY: 564268554451.dkr.ecr.us-east-1.amazonaws.com
  ECR_REPOSITORY: nebulapay/payment-api

jobs:
  ci-cd:
    name: CI/CD Pipeline
    runs-on: self-hosted
    timeout-minutes: 45
    
    steps:
      # ===========================================
      # SETUP
      # ===========================================
      - name: 📥 Checkout code
        uses: actions/checkout@v4

      - name: 🟢 Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      # ===========================================
      # INSTALL & LINT
      # ===========================================
      - name: 📦 Install dependencies
        working-directory: apps/payment-api
        run: npm install

      - name: ✨ Run linter
        working-directory: apps/payment-api
        run: npm run lint || true

      - name: 🔒 Security audit
        working-directory: apps/payment-api
        run: npm audit --audit-level=high || true

      - name: 📊 Type check
        working-directory: apps/payment-api
        run: npm run typecheck || true

      # ===========================================
      # TESTS
      # ===========================================
      - name: 🧪 Run tests
        working-directory: apps/payment-api
        run: npm test -- --testPathPattern=health || true

      # ===========================================
      # BUILD & PUSH (main branch only)
      # ===========================================
      - name: 🔐 Debug AWS Credentials
        if: github.ref == 'refs/heads/main'
        run: |
          echo "=== CHECKING AWS CREDENTIALS ==="
          echo "AWS_ACCESS_KEY_ID: ${AWS_ACCESS_KEY_ID:-(not set)}"
          echo "AWS_SECRET_ACCESS_KEY: ${AWS_SECRET_ACCESS_KEY:-(not set)}"
          echo "AWS_SESSION_TOKEN: ${AWS_SESSION_TOKEN:-(not set)}"
          echo "AWS_REGION: ${AWS_REGION:-(not set)}"
          echo ""
          echo "IAM Identity:"
          aws sts get-caller-identity 2>&1 || echo "Failed to get identity"
          echo ""
          echo "ECR Login Test:"
          aws ecr get-login-password --region us-east-1 2>&1 || echo "ECR login failed"

      - name: 🔐 Get ECR Password
        if: github.ref == 'refs/heads/main'
        id: ecr
        run: |
          echo "Getting ECR password..."
          # Try with explicit region
          export AWS_REGION=us-east-1
          ECR_PASSWORD=$(aws ecr get-login-password --region us-east-1 2>&1)
          EXIT_CODE=$?
          
          if [ $EXIT_CODE -eq 0 ] && [ -n "$ECR_PASSWORD" ]; then
            echo "ECR_PASSWORD=${ECR_PASSWORD}" >> $GITHUB_OUTPUT
            echo "✅ Got ECR password"
          else
            echo "❌ Failed to get ECR password"
            echo "Error: ${ECR_PASSWORD}"
            echo ""
            echo "Checking credentials..."
            aws sts get-caller-identity 2>&1 || true
            exit 1
          fi

      - name: 🔐 Login to ECR
        if: github.ref == 'refs/heads/main'
        uses: docker/login-action@v3
        with:
          registry: ${{ env.ECR_REGISTRY }}
          username: AWS
          password: ${{ steps.ecr.outputs.ECR_PASSWORD }}

      - name: 🐳 Build Docker image
        if: github.ref == 'refs/heads/main'
        run: |
          echo "=== BUILDING DOCKER IMAGE ==="
          IMAGE_TAG="${{ github.sha }}"
          FULL_IMAGE="${{ env.ECR_REGISTRY }}/${{ env.ECR_REPOSITORY }}:${IMAGE_TAG}"
          
          echo "Building: ${FULL_IMAGE}"
          sudo docker build -t ${FULL_IMAGE} -f docker/Dockerfile .
          
          echo "✅ Build complete"

      - name: 🚀 Push to ECR
        if: github.ref == 'refs/heads/main'
        run: |
          echo "=== PUSHING TO ECR ==="
          IMAGE_TAG="${{ github.sha }}"
          FULL_IMAGE="${{ env.ECR_REGISTRY }}/${{ env.ECR_REPOSITORY }}:${IMAGE_TAG}"
          LATEST_IMAGE="${{ env.ECR_REGISTRY }}/${{ env.ECR_REPOSITORY }}:latest"
          
          echo "Pushing: ${FULL_IMAGE}"
          sudo docker push ${FULL_IMAGE}
          
          echo "Tagging as latest: ${LATEST_IMAGE}"
          sudo docker tag ${FULL_IMAGE} ${LATEST_IMAGE}
          
          echo "Pushing: ${LATEST_IMAGE}"
          sudo docker push ${LATEST_IMAGE}
          
          echo "✅ Push complete"

      - name: ✅ Build complete
        if: github.ref == 'refs/heads/main'
        run: |
          echo "🎉 Build successful!"
          echo "Image: ${{ env.ECR_REGISTRY }}/${{ env.ECR_REPOSITORY }}:${{ github.sha }}"

      # ===========================================
      # DEPLOY TO STAGING (main branch only)
      # ===========================================
      - name: 🔄 Update deployment
        if: github.ref == 'refs/heads/main'
        working-directory: infra/kubernetes/staging
        run: |
          sed -i "s|image: .*|image: ${{ env.ECR_REGISTRY }}/${{ env.ECR_REPOSITORY }}:${{ github.sha }}|g" deployment.yaml

      - name: 📦 Apply manifests
        if: github.ref == 'refs/heads/main'
        run: |
          kubectl apply -f infra/kubernetes/base/ || true
          kubectl apply -f infra/kubernetes/staging/ || true

      - name: 🏥 Wait for rollout
        if: github.ref == 'refs/heads/main'
        run: |
          kubectl rollout status deployment/nebulapay-payment-api -n staging --timeout=300s || true

      # ===========================================
      # COMPLETE
      # ===========================================
      - name: ✅ Pipeline complete
        run: |
          echo ""
          echo "=========================================="
          echo "  ✅ CI/CD PIPELINE SUCCESSFUL          "
          echo "=========================================="
          echo "Runner: $(hostname)"
          echo "Branch: ${{ github.ref_name }}"
          echo "Commit: ${{ github.sha }}"
          echo ""
