name: CI/CD Pipeline

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]
  workflow_dispatch:

env:
  AWS_REGION: us-east-1
  ECR_REGISTRY: 564268554451.dkr.ecr.us-east-1.amazonaws.com
  ECR_REPOSITORY: nebulapay/payment-api

jobs:
  ci-cd:
    name: CI/CD Pipeline
    runs-on: self-hosted
    timeout-minutes: 45
    
    steps:
      # ===========================================
      # SETUP
      # ===========================================
      - name: 📥 Checkout code
        uses: actions/checkout@v4

      - name: 🟢 Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: 🔧 Fix Docker permissions
        run: |
          echo "=== FIXING DOCKER PERMISSIONS ==="
          # Add current user to docker group
          sudo usermod -aG docker $USER
          # Try to start docker if not running
          sudo systemctl start docker || true
          # Verify docker works
          docker ps || echo "Docker check"

      - name: 🔧 Setup Docker (alternative)
        run: |
          echo "Setting up Docker without buildx..."
          docker --version
          docker info

      # ===========================================
      # INSTALL & LINT
      # ===========================================
      - name: 📦 Install dependencies
        working-directory: apps/payment-api
        run: npm install

      - name: ✨ Run linter
        working-directory: apps/payment-api
        run: npm run lint || true

      - name: 🔒 Security audit
        working-directory: apps/payment-api
        run: npm audit --audit-level=high || true

      - name: 📊 Type check
        working-directory: apps/payment-api
        run: npm run typecheck || true

      # ===========================================
      # TESTS
      # ===========================================
      - name: 🧪 Run tests
        working-directory: apps/payment-api
        run: npm test -- --testPathPattern=health || true

      # ===========================================
      # BUILD & PUSH (main branch only)
      # ===========================================
      - name: 🔐 Login to ECR
        if: github.ref == 'refs/heads/main'
        uses: docker/login-action@v3
        with:
          registry: ${{ env.ECR_REGISTRY }}
          username: AWS
          password: ${{ secrets.AWS_ECR_PASSWORD }}

      - name: 🐳 Build Docker image (without buildx)
        if: github.ref == 'refs/heads/main'
        run: |
          echo "=== BUILDING DOCKER IMAGE ==="
          echo "Current directory: $(pwd)"
          echo "Files in current directory:"
          ls -la
          echo ""
          echo "Checking Dockerfile location:"
          ls -la docker/ 2>&1 || echo "docker/ directory not found"
          ls -la Dockerfile 2>&1 || echo "Dockerfile not found in root"
          echo ""
          IMAGE_TAG="${{ github.sha }}"
          FULL_IMAGE="${{ env.ECR_REGISTRY }}/${{ env.ECR_REPOSITORY }}:${IMAGE_TAG}"
          
          echo "Building image: ${FULL_IMAGE}"
          echo "Using Dockerfile: docker/Dockerfile"
          echo ""
          
          # Check if Dockerfile exists
          if [ -f "docker/Dockerfile" ]; then
            echo "✅ Dockerfile found"
          else
            echo "❌ Dockerfile NOT FOUND at docker/Dockerfile"
            find . -name "Dockerfile" -type f 2>/dev/null
            exit 1
          fi
          
          # Build without buildx (simpler, more reliable)
          docker build -t ${FULL_IMAGE} -f docker/Dockerfile .
          BUILD_EXIT=$?
          
          if [ $BUILD_EXIT -eq 0 ]; then
            echo "✅ Build complete"
            echo "Image: ${FULL_IMAGE}"
          else
            echo "❌ Build failed with exit code: $BUILD_EXIT"
            exit $BUILD_EXIT
          fi

      - name: 🚀 Push to ECR
        if: github.ref == 'refs/heads/main'
        run: |
          echo "=== PUSHING TO ECR ==="
          IMAGE_TAG="${{ github.sha }}"
          FULL_IMAGE="${{ env.ECR_REGISTRY }}/${{ env.ECR_REPOSITORY }}:${IMAGE_TAG}"
          
          # Push SHA tag
          docker push ${FULL_IMAGE}
          
          # Push latest tag
          LATEST_IMAGE="${{ env.ECR_REGISTRY }}/${{ env.ECR_REPOSITORY }}:latest"
          docker tag ${FULL_IMAGE} ${LATEST_IMAGE}
          docker push ${LATEST_IMAGE}
          
          echo "✅ Push complete"
          echo "Images:"
          echo "  - ${FULL_IMAGE}"
          echo "  - ${LATEST_IMAGE}"

      - name: ✅ Build complete
        if: github.ref == 'refs/heads/main'
        run: |
          echo "🎉 Build successful!"
          echo "Image: ${{ env.ECR_REGISTRY }}/${{ env.ECR_REPOSITORY }}:${{ github.sha }}"

      # ===========================================
      # DEPLOY TO STAGING (main branch only)
      # ===========================================
      - name: 🔄 Update deployment
        if: github.ref == 'refs/heads/main'
        working-directory: infra/kubernetes/staging
        run: |
          sed -i "s|image: .*|image: ${{ env.ECR_REGISTRY }}/${{ env.ECR_REPOSITORY }}:${{ github.sha }}|g" deployment.yaml

      - name: 📦 Apply manifests
        if: github.ref == 'refs/heads/main'
        run: |
          kubectl apply -f infra/kubernetes/base/ || true
          kubectl apply -f infra/kubernetes/staging/ || true

      - name: 🏥 Wait for rollout
        if: github.ref == 'refs/heads/main'
        run: |
          kubectl rollout status deployment/nebulapay-payment-api -n staging --timeout=300s || true

      # ===========================================
      # COMPLETE
      # ===========================================
      - name: ✅ Pipeline complete
        run: |
          echo ""
          echo "=========================================="
          echo "  ✅ CI/CD PIPELINE SUCCESSFUL          "
          echo "=========================================="
          echo "Runner: $(hostname)"
          echo "Branch: ${{ github.ref_name }}"
          echo "Commit: ${{ github.sha }}"
          echo ""