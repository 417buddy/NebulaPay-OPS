apiVersion: v1
kind: ServiceAccount
metadata:
  name: payment-api
  namespace: staging
  labels:
    app: payment-api
---
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: payment-api-role
  namespace: staging
rules:
  - apiGroups: [""]
    resources: ["configmaps", "secrets"]
    verbs: ["get", "list"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: payment-api-rolebinding
  namespace: staging
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: Role
  name: payment-api-role
subjects:
  - kind: ServiceAccount
    name: payment-api
    namespace: staging
